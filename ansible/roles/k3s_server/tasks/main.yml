---
- name: Install K3s server
  ansible.builtin.command:
    cmd: /usr/local/bin/k3s-install.sh
  environment:
    INSTALL_K3S_CHANNEL: stable
    INSTALL_K3S_EXEC: >-
      server
      --node-name {{ inventory_hostname }}
      --node-ip {{ ansible_host }}
      --advertise-address {{ ansible_host }}
      --tls-san {{ ansible_host }}
      --write-kubeconfig-mode 644
  args:
    creates: /etc/systemd/system/k3s.service
  changed_when: false

- name: Enable and start K3s server
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Kubernetes API server
  ansible.builtin.wait_for:
    host: '{{ ansible_host }}'
    port: 6443
    timeout: 300

- name: Read K3s node token
  ansible.builtin.command: cat /var/lib/rancher/k3s/server/node-token
  register: k3s_server_node_token_raw
  changed_when: false
  no_log: true

- name: Store K3s node token as fact
  ansible.builtin.set_fact:
    k3s_server_node_token: '{{ k3s_server_node_token_raw.stdout }}'
  no_log: true

- name: Check K3s server node
  ansible.builtin.command: k3s kubectl get nodes -o wide
  register: k3s_server_nodes
  changed_when: false

- name: Show K3s server nodes
  ansible.builtin.debug:
    var: k3s_server_nodes.stdout_lines
