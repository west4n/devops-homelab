---
- name: Prepare K3s common settings
  hosts: k3s_cluster
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait until SSH is available
      ansible.builtin.wait_for_connection:
        timeout: 300

  roles:
    - k3s_common

- name: Install K3s server
  hosts: k3s_control_plane
  become: true
  gather_facts: true

  roles:
    - k3s_server

- name: Install K3s agents
  hosts: k3s_workers
  become: true
  gather_facts: true

  roles:
    - k3s_agent

- name: Fetch kubeconfig
  hosts: k3s_control_plane
  become: true
  gather_facts: false

  tasks:
    - name: Ensure local kubeconfig directory exists
      ansible.builtin.file:
        path: '{{ playbook_dir }}/../kubeconfig'
        state: directory
        mode: '0700'
      delegate_to: localhost
      become: false

    - name: Read kubeconfig from control plane
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: k3s_kubeconfig_raw
      no_log: true

    - name: Save kubeconfig locally
      ansible.builtin.copy:
        content: "{{ k3s_kubeconfig_raw.content | b64decode | replace('https://127.0.0.1:6443', 'https://' ~ ansible_host ~ ':6443') }}"
        dest: '{{ playbook_dir }}/../kubeconfig/k3s-homelab.yaml'
        mode: '0600'
      delegate_to: localhost
      become: false
      no_log: true

- name: Verify K3s cluster
  hosts: k3s_control_plane
  become: true
  gather_facts: false

  tasks:
    - name: Get cluster nodes
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: k3s_cluster_nodes
      changed_when: false

    - name: Show cluster nodes
      ansible.builtin.debug:
        var: k3s_cluster_nodes.stdout_lines

    - name: Get system pods
      ansible.builtin.command: k3s kubectl get pods -A
      register: k3s_system_pods
      changed_when: false

    - name: Show system pods
      ansible.builtin.debug:
        var: k3s_system_pods.stdout_lines
