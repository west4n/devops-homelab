---
- name: Set system hostname
  ansible.builtin.hostname:
    name: '{{ inventory_hostname }}'

- name: Ensure K3s node hostname resolve to cluster IPs
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: '# {mark} ANSIBLE MANAGED K3S HOSTS'
    block: |
      {% for host in groups['k3s_cluster'] %}
      {{ hostvars[host].ansible_host }} {{ host }}
      {% endfor %}

- name: Build K3s cluster node IP list
  ansible.builtin.set_fact:
    k3s_common_cluster_node_ips: "{{ groups['k3s_cluster'] | map('extract', hostvars, 'ansible_host') | list }}"

- name: Allow Kubernetes API server from cluster nodes
  community.general.ufw:
    rule: allow
    proto: tcp
    port: '6443'
    from_ip: '{{ item }}'
  loop: '{{ k3s_api_allowed_client_cidrs | default([]) }}'
  when: inventory_hostname in groups['k3s_control_plane']

- name: Reload UFW
  community.general.ufw:
    state: reloaded

- name: Download K3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /usr/local/bin/k3s-install.sh
    mode: '0755'
